name: Test Build

on:
  workflow_dispatch:


jobs:
  build-test:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: .exe
            runs-on: ubuntu-latest
            cgo_enabled: '0'
          

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build app
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo_enabled }}
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          LDFLAGS="-s -w -X Doubao-input/info.Version=${VERSION}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="${LDFLAGS} -H windowsgui"
          fi
          go build -ldflags="${LDFLAGS}" -o doubao-input-app-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} ./cmd/test

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: doubao-input-app-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            doubao-input-app-*-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '*.md'

jobs:
  build-app:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: .exe
            runs-on: ubuntu-latest
            cgo_enabled: '1'
          - goos: linux
            goarch: amd64
            suffix: ''
            runs-on: ubuntu-latest
            cgo_enabled: '1'
          - goos: darwin
            goarch: amd64
            suffix: ''
            runs-on: macos-latest
            cgo_enabled: '1'
          - goos: darwin
            goarch: arm64
            suffix: ''
            runs-on: macos-latest
            cgo_enabled: '1'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build app
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo_enabled }}
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          LDFLAGS="-s -w -X Doubao-input/info.Version=${VERSION}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="${LDFLAGS} -H windowsgui"
          fi
          go build -tags typing -ldflags="${LDFLAGS}" -o doubao-input-app-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} ./cmd/app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: doubao-input-app-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            doubao-input-app-*-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
